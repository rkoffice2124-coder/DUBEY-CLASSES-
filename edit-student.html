<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DUBEY CLASSES | Edit Student</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header class="admin-header">

<div class="admin-brand">

<img src="logo.png" alt="DUBEY CLASSES Logo" class="logo">

<div>

<h1>DUBEY CLASSES</h1>

<p>Edit Student Details</p>

</div>

</div>

<button
class="logout-btn"
onclick="location.href='students.html'">

👨‍🎓 Student List

</button>

</header>

<section>

<h2>✏️ Edit Student Details</h2>

<div class="card">

<form id="editForm">

<input
type="text"
id="name"
placeholder="Student Name"
required>

<input
type="text"
id="father"
placeholder="Father / Guardian Name"
required>

<select id="className" required>

<option value="">Select Class</option>

<option value="Class VI">Class VI</option>
<option value="Class VII">Class VII</option>
<option value="Class VIII">Class VIII</option>
<option value="Class IX">Class IX</option>
<option value="Class X">Class X</option>

</select>

<input
type="tel"
id="mobile"
placeholder="Mobile Number"
required>

<textarea
id="address"
placeholder="Complete Address"
rows="4">
</textarea>

<button type="submit">

💾 Update Student

</button>

</form>

</div>

<div class="card" style="text-align:center;">

<button onclick="location.href='students.html'">

⬅ Back to Student List

</button>

</div>

</section>

<script type="module" src="edit-student.js"></script>

</body>

</html>
