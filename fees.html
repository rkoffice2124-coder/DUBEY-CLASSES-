<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DUBEY CLASSES | Fee Collection</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header class="admin-header">

<div class="admin-brand">

<img src="logo.png" alt="DUBEY CLASSES Logo" class="logo">

<div>

<h1>DUBEY CLASSES</h1>

<p>Fee Collection</p>

</div>

</div>

<button
class="logout-btn"
onclick="location.href='admin.html'">

🏠 Dashboard

</button>

</header>

<section>

<h2>💰 Monthly Fee Collection</h2>

<div class="card">

<form id="feeForm">

<input
type="text"
id="studentName"
placeholder="Student Name"
required>

<input
type="text"
id="father"
placeholder="Father / Guardian Name"
required>

<select id="studentClass" required>

<option value="">Select Class</option>

<option value="6">Class VI</option>
<option value="7">Class VII</option>
<option value="8">Class VIII</option>
<option value="9">Class IX</option>
<option value="10">Class X</option>

</select>

<input
type="month"
id="feeMonth"
required>

<input
type="number"
id="amount"
placeholder="Fee Amount"
readonly
required>

<button type="submit">

💰 Save Fee & Print Receipt

</button>

</form>

</div>

<div class="card">

<h3>📋 Monthly Fee Structure</h3>

<p><strong>Class VI – VIII :</strong> ₹1,500</p>

<p><strong>Class IX – X :</strong> ₹1,500</p>

</div>

<div class="card" style="text-align:center;">

<button onclick="location.href='admin.html'">

⬅ Back to Dashboard

</button>

</div>

</section>

<script type="module" src="fees.js"></script>

</body>

</html>
