<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DUBEY CLASSES | Admin Login</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<section style="max-width:450px;margin:60px auto;">

<div class="card" style="text-align:center;">

<img src="logo.png"
alt="DUBEY CLASSES Logo"
style="width:90px;height:90px;border-radius:50%;margin-bottom:15px;">
<h2>🔐 Admin Login</h2>

<p style="margin-bottom:20px;color:#666;">
Please login to continue
</p>

<form id="loginForm">

<input
type="email"
id="email"
placeholder="Email Address"
required>

<input
type="password"
id="password"
placeholder="Password"
required>

<button type="submit">

Login

</button>

</form>

<p
id="loginError"
style="color:red;margin-top:15px;font-weight:bold;">
</p>

</div>

</section>

<script type="module" src="login.js"></script>

</body>

</html>
