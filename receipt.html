<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DUBEY CLASSES | Fee Receipt</title>

<link rel="stylesheet" href="style.css">

<style>

body{
    background:#f4f7fc;
}

.receipt{
    max-width:750px;
    margin:30px auto;
    background:#fff;
    padding:30px;
    border:3px solid #0d47a1;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,.12);
}

.receipt-header{
    display:flex;
    align-items:center;
    gap:20px;
    border-bottom:3px solid #0d47a1;
    padding-bottom:18px;
}

.receipt-header img{
    width:80px;
    height:80px;
    border-radius:50%;
    object-fit:contain;
}

.receipt-title{
    flex:1;
}

.receipt-title h1{
    color:#d50000;
    font-size:34px;
    margin-bottom:5px;
}

.receipt-title p{
    margin:3px 0;
}

.receipt-heading{
    margin:25px 0;
    text-align:center;
    background:#0d47a1;
    color:#fff;
    padding:12px;
    border-radius:8px;
    font-size:22px;
    font-weight:bold;
}

.receipt table{
    width:100%;
    border-collapse:collapse;
}

.receipt td{
    border:1px solid #ddd;
    padding:14px;
}

.receipt td:first-child{
    width:35%;
    background:#f7f9ff;
    font-weight:bold;
}

.amount{
    color:#2e7d32;
    font-size:24px;
    font-weight:bold;
}

.footer{
    margin-top:40px;
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
}

.status{
    color:#2e7d32;
    font-weight:bold;
    font-size:20px;
}

.signature{
    text-align:center;
}

.signature hr{
    width:180px;
}

.printBtn{
    margin-top:30px;
}

@media print{

body{
    background:#fff;
}

.printBtn{
    display:none;
}

.receipt{
    box-shadow:none;
    border:2px solid #000;
    margin:0;
}

}

</style>

</head>

<body>

<div class="receipt">

<div class="receipt-header">

<img src="logo.png" alt="Logo">

<div class="receipt-title">

<h1>DUBEY CLASSES</h1>

<p><strong>Mathematics & Science Coaching (Classes VI–X)</strong></p>

<p>Anand Marg Colony, DVC, Aliganj, Bhagalpur</p>

<p>📞 7503322363</p>

</div>

</div>

<div class="receipt-heading">

MONTHLY FEE RECEIPT

</div>

<table>

<tr>
<td>Receipt No.</td>
<td id="receiptNo">DC-2026-0001</td>
</tr>

<tr>
<td>Student Name</td>
<td id="studentName"></td>
</tr>

<tr>
<td>Father / Guardian</td>
<td id="fatherName"></td>
</tr>

<tr>
<td>Class</td>
<td id="studentClass"></td>
</tr>

<tr>
<td>Fee Month</td>
<td id="feeMonth"></td>
</tr>

<tr>
<td>Amount Paid</td>
<td id="amount" class="amount"></td>
</tr>

<tr>
<td>Payment Date</td>
<td id="paidDate"></td>
</tr>

</table>

<div class="footer">

<div>

Status:
<span class="status">PAID ✓</span>

</div>

<div class="signature">

<hr>

<b>Authorized Signature</b>

</div>

</div>

<button class="printBtn" onclick="window.print()">

🖨️ Print / Save as PDF

</button>

</div>

<script type="module" src="receipt.js"></script>

</body>

</html>
