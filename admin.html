<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DUBEY CLASSES - Admin Dashboard</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header class="admin-header">

    <img src="logo.png" alt="DUBEY CLASSES Logo" class="logo">

    <div class="title">
        <h1>DUBEY CLASSES</h1>
        <p>Admin Dashboard</p>
    </div>

</header>

<section>

    <h2>Dashboard</h2>

<div class="card">

<h3>👨‍🎓 Total Students</h3>

<h1 id="totalStudents">0</h1>

<p>Registered Students</p>

</div>
    <div class="card">
    <h3>💰 Total Fees Collected</h3>
    <h1 id="totalFees">₹0</h1>
</div>
    <div class="card">

    <h3>📅 This Month Collection</h3>

    <h1 id="monthlyFees">₹0</h1>

</div>
    <div class="card">

    <h3>⏳ Pending Fees</h3>

    <h1 id="pendingStudents">0</h1>

    <p>Students Pending This Month</p>

</div>

    <div class="card">
        <button onclick="location.href='index.html'">
            ➕ New Admission
        </button>
    </div>

    <div class="card">
        <button onclick="location.href='students.html'">
            👨‍🎓 View Students
        </button>
    </div>

    <div class="card">
        <button onclick="location.href='fees.html'">
            💰 Fee Collection
        </button>
    </div>

    <div class="card">
        <h3>📚 Monthly Fee Structure</h3>
        <p><strong>Class VI – VIII :</strong> ₹2,000</p>
        <p><strong>Class IX – X :</strong> ₹2,500</p>
    </div>

    <div class="card">
        <button id="logoutBtn">
            🚪 Logout
        </button>
    </div>

</section>

<script type="module" src="admin.js"></script>

</body>

</html>
